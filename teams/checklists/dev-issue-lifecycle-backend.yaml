# =============================================================================
# Dev Lifecycle Checklist (Backend-Dev)
# =============================================================================
#
# The full iterative loop for ALL backend development work — single issues,
# multi-phase implementation plans, crosswalk requests, and QA iterations.
#
# Usage: "Start polling" / "Poll" / "Begin polling"
#   → Confirm sub-role at session start, then execute this workflow continuously.
#
# Two nested loops:
#   OUTER: Poll → Assess → Plan → Contracts → [inner loop per issue]
#   INNER: Implement → Verify → Document → QA → Iterate
#
# =============================================================================

version: "2.0.0"
name: Dev Lifecycle (Backend)
applies_to:
  - backend-dev

# ---------------------------------------------------------------------------
# Phase 0: Comms Poll & Triage
# ---------------------------------------------------------------------------
# Run at the start of each iteration. Detects new work, QA rejections,
# frontend contract requests, plans, and blockers.

phase_0_comms:
  name: Poll comms and triage
  trigger: start_of_iteration
  steps:
    - Read backend/inbox/ for new messages
    - Read backend/issues/queue/ for unstarted issues
    - Read backend/issues/active/ for in-progress or QA-blocked issues
    - Classify each inbox message:
        - contract_request → Phase 1
        - implementation_plan → Phase 0b (assess & decompose)
        - qa_finding → match to active issue, prioritize re-fix
        - frontend_bug_report → Phase 0b (assess, create issue)
        - status_update → acknowledge, no action unless blocking
    - Match QA findings and frontend requests to active issues
    - Unblock issues where dependencies are resolved
  sources:
    - dev_communication/backend/inbox
    - dev_communication/backend/issues/queue
    - dev_communication/backend/issues/active

# ---------------------------------------------------------------------------
# Phase 0b: Assess & Decompose
# ---------------------------------------------------------------------------
# For work that is NOT a single issue — plans, crosswalk requests,
# large feature requests, multi-endpoint contract proposals.
# Break into actionable issues and plan documents before any implementation.

phase_0b_assess:
  name: Assess and decompose into issues
  trigger: new_plan_or_large_request
  steps:
    - Read the full request/plan document
    - Identify distinct work items (new endpoints, enhancements, bug fixes, confirmations)
    - Group into implementation phases ordered by dependency and priority
    - Create a plan document in dev_communication/shared/plans/ if one doesn't exist
    - Create individual issues in backend/issues/queue/ for each work item
    - For each issue, note dependencies (which issues block which)
    - Proceed to Phase 1 with the full set of issues
  rules:
    - Every actionable item becomes a tracked issue
    - Phase ordering respects dependencies (contracts before implementation)
    - Plan documents live in dev_communication/shared/plans/
    - Issues reference the plan document for traceability

# ---------------------------------------------------------------------------
# Phase 1: Contracts & Cross-Team Setup
# ---------------------------------------------------------------------------
# Backend DEFINES contracts. When frontend requests new contracts or the
# plan includes new/changed endpoints, update ALL contract DTOs first,
# then send to frontend so they are unblocked BEFORE implementation begins.
#
# For multi-issue plans: define contracts for ALL issues in the plan at once.
# Do not wait until implementing each issue to define its contract.

phase_1_contracts:
  name: Define or update contracts
  steps:
    - Read frontend contract requests from backend/inbox/
    - Read contracts/types/ for existing DTOs
    - For EACH new/changed endpoint across ALL planned issues:
        - Define the contract DTO in contracts/types/
        - Include request shape, response shape, query params, error cases
    - Send ONE consolidated contract confirmation to frontend/inbox/
    - Include: endpoint paths, DTO details, implementation timeline/ordering
    - If no contract changes needed, proceed to Phase 2
  rule: >
    Backend owns contract definitions. Frontend consumes them.
    Update the shared contract DTO first, then implement the endpoint.
    Never ship an endpoint whose response shape differs from the contract DTO.
    For plans with multiple endpoints, send ALL contracts upfront.
    Frontend should not be waiting on contracts while backend implements.
  reference: ADR-DEV-004-CONSUME-CONTRACTS-DIRECTLY-NO-NORMALIZERS

# ---------------------------------------------------------------------------
# Phase 2: Context Loading
# ---------------------------------------------------------------------------

phase_2_context:
  name: Load context
  steps:
    - Load relevant ADRs from dev_communication/shared/architecture/decisions/
    - Load memory patterns from memory/patterns/
    - Read the issue file for acceptance criteria and prior QA findings
    - Identify which ADRs apply by change type (see ADR-DEV-002)
    - Review Mongoose schema and existing service layer for the affected domain
  skill: /context

# ---------------------------------------------------------------------------
# Phase 3: Implementation
# ---------------------------------------------------------------------------

phase_3_implement:
  name: Implement
  steps:
    - Move issue from queue/ to active/ (if not already active)
    - Plan if complex (schema migration, multi-service change, new middleware)
    - Update Mongoose models/schemas as needed
    - Implement service layer logic
    - Implement route handlers
    - Ensure response shapes match contract DTOs exactly
    - Write tests for new functionality as part of implementation
    - If QA-rejected, address specific QA findings before re-verifying
  rules:
    - New functionality must have corresponding tests
    - Response shapes must match shared contract DTOs
    - Use markModified() for Mongoose Mixed-type fields
    - Validate at system boundaries (request input, external APIs)
    - Do not add backward-compatibility shims or deprecated fields

# ---------------------------------------------------------------------------
# Phase 4: Dev Verification Gate (BLOCKING)
# ---------------------------------------------------------------------------
# All must pass. Do not hand off to QA with failures.

phase_4_verify:
  name: Dev verification gate
  blocking: true
  checks:
    typecheck:
      command: npx tsc --noEmit
      criteria: 0 errors
    unit_tests:
      command: npm run test:unit
      criteria: all pass
    integration_tests:
      command: npm run test:integration
      criteria: all pass
    tests_exist:
      criteria: new functionality has corresponding tests
  on_failure: fix and re-run — do not proceed

# ---------------------------------------------------------------------------
# Phase 5: Documentation & Handoff
# ---------------------------------------------------------------------------

phase_5_document:
  name: Document and hand off to QA
  steps:
    - Create session file at memory/sessions/{date}-{issue-slug}.md
    - Append resolution notes to the issue file
    - If contract was added/changed, confirm contracts/types/ is updated
    - If new pattern discovered, update memory/patterns/ or /adr suggest
    - If frontend impact, send message to frontend/inbox/ via /comms send
    - Commit and push
  handoff_rule: >
    Issue stays in active/ with Status: ACTIVE.
    Do NOT move to completed/. Do NOT set Status: COMPLETE.
    QA owns Phase 6 (verification) and Phase 7 (completion).

# ---------------------------------------------------------------------------
# Phase 6: Wait for QA
# ---------------------------------------------------------------------------
# Dev does not act here. QA runs their qa-gate.yaml checklist.
# This phase ends when QA writes back to backend/inbox/ or updates
# the issue file with findings.
# While waiting, pick the next issue from queue/ and start Phase 2.

phase_6_wait_for_qa:
  name: Wait for QA verdict
  action: poll
  poll_sources:
    - dev_communication/backend/inbox
    - dev_communication/backend/issues/active
  look_for:
    - QA verdict appended to issue file (Pass, Blocked, Need More Info)
    - QA message in backend/inbox/ referencing the issue
  outcomes:
    pass: QA moves issue to completed/ — done
    blocked: return to phase_0 with QA findings, iterate
    need_more_info: return to phase_0, respond to QA questions
  while_waiting: >
    Do not idle. Pick the next unblocked issue from queue/ or active/
    and begin Phase 2 for that issue. Multiple issues can be in-flight
    at different phases simultaneously.

# ---------------------------------------------------------------------------
# Phase 7: Iterate Until Acceptance
# ---------------------------------------------------------------------------
# On QA rejection, loop back to Phase 0. The inbox will contain QA findings.
# Address findings, re-verify, re-document, and wait for QA again.
# On plan completion, loop back to Phase 0 to check for new work.

phase_7_iterate:
  name: Iterate
  loop: phase_0_comms
  exit_condition: >
    All issues in backend/issues/active/ have been moved to completed/
    by QA, AND no more issues remain in queue/ or active/,
    AND no unprocessed messages remain in backend/inbox/.

# ---------------------------------------------------------------------------
# Automation
# ---------------------------------------------------------------------------

automation:
  commands:
    typecheck: npx tsc --noEmit
    unit: npm run test:unit
    integration: npm run test:integration
    uat: npm run test:uat
  issue_prefix: API-ISS
  session_path: memory/sessions/{date}-{issue-slug}.md
