version: "4.0.0"
name: QA Issue Lifecycle
applies_to: [frontend-qa, backend-qa, "*-qa"]

qa_state:
  field: QA
  values: [PENDING, IN_PROGRESS, PENDING_MANUAL_REVIEW, BLOCKED, PASS]
  transitions:
    PENDING: [IN_PROGRESS]
    IN_PROGRESS: [PENDING_MANUAL_REVIEW, BLOCKED, PENDING]
    PENDING_MANUAL_REVIEW: [PASS, BLOCKED]
    BLOCKED: [PENDING]
    PASS: []

phase_0_comms:
  name: Scan & triage
  blocking: true
  steps:
    - Read CONTENTS of every file in {team}/inbox/ (not completed/)
    - Read CONTENTS of every file in {team}/issues/active/
    - Include QA=PENDING and QA=PENDING_MANUAL_REVIEW in candidate set
    - Stale PENDING_MANUAL_REVIEW >30m → prioritize before new work
    - Stale BLOCKED >12h → include for recheck
    - Match dev re-handoff messages and Dev Response annotations to active issues
    - Output triage summary
  qa_ready_markers: [Development Complete, Awaiting QA, QA Ready, Resolution Notes]

phase_1_entry:
  name: Entry validation
  steps:
    - Issue in active/ with Status ACTIVE or DEV_COMPLETE
    - Resolution notes present
    - Acceptance criteria defined
    - "Freshness (previously BLOCKED): both a fresh dev inbox handoff AND a fresh Dev Response section, each newer than last QA Verification"
    - "Commit/push evidence present: dev handoff includes commit hash/reference plus explicit evidence the work was pushed to shared remote"
    - Implementation evidence (commits, changed files, or tests)
    - If commit/push evidence is missing, emit Need More Info
    - If planning-only, emit Need More Info

phase_2_automated:
  name: Automated gates
  blocking: true
  timeout_policy:
    per_check_timeout_seconds: 600
  on_all_pass: proceed to Phase 3 (set PENDING_MANUAL_REVIEW only if manual review deferred)
  on_failure: set BLOCKED, record failures

phase_3_manual:
  name: Manual review
  checks: [accuracy, efficiency, non-duplication, security, adr_conformance, contract_alignment, regression]

phase_4_verdict:
  name: Verdict
  verdicts:
    pass: { action: "→ Phase 5" }
    pass_with_conditions: { action: "→ Phase 5 with notes" }
    pending_manual_review: { action: "temporary checkpoint only — resolve promptly, do NOT notify dev" }
    blocked: { action: "notify dev with evidence and unblock criteria" }
    need_more_info: { action: "send questions to dev" }
  severity: [Critical, High, Medium, Low]
  evidence_required:
    - issue_reference
    - file_or_route_reference
    - automated_gate_results
    - acceptance_criteria_to_test_mapping
    - manual_review_notes
    - commit_hash_or_reference
    - push_evidence_status
    - unblock_criteria_for_blocked_or_need_more_info

phase_5_complete:
  name: Completion (QA only)
  guard: verdict == pass
  steps:
    - Confirm commit hash/reference and push evidence are present in dev handoff
    - Set QA=PASS, Status=COMPLETE
    - Move issue active/ → completed/
    - Move messages to inbox/completed/
    - Send completion notice

phase_6_iterate:
  name: Iterate
  outcomes:
    pass: done
    pending_manual_review: QA must complete manual review next iteration
    blocked: send findings, wait for dev re-submit (both inbox + Dev Response)
    need_more_info: send questions, wait for dev

autonomous_mode:
  implied_flags: { watch: 1, approve: 1, recheck_existing: 1, emit_dev_message: 1 }
  pending_manual_review_sla_minutes: 30

automation:
  default_gate_timeout_seconds: 600
  commands:
    frontend:
      typecheck: npx tsc --noEmit
      unit: npx vitest run
      integration: npx vitest run --config vitest.integration.config.ts
      uat: npx playwright test --project=chromium
    backend:
      typecheck: npx tsc --noEmit
      unit: npm run test:unit
      integration: npm run test:integration
      uat: npm run contracts:validate
