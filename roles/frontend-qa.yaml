# =============================================================================
# Sub-Team Role Definition: Frontend-QA
# =============================================================================
#
# Load this file to configure an agent controller window as a Frontend-QA.
# The team config (team.json) is written by the installer. This role definition
# is loaded at session start when the user selects their sub-role.
#
# =============================================================================

role_id: frontend-qa
role_name: Frontend-QA
team_id: frontend
function: qa
issue_prefix: UI-QA
role_guidance: dev_communication/shared/guidance/FRONTEND_QA_ROLE_GUIDANCE.md
qa_checklist: ai_team_config/teams/checklists/qa-gate.yaml
qa_runner: ai_team_config/scripts/qa_poll_cycle.sh
default_poll_seconds: 240
procedures:
  polling: ai_team_config/procedures/polling-workflow.md
  lifecycle: ai_team_config/procedures/qa-lifecycle.md
  comms: ai_team_config/procedures/comms-protocol.md

# What this role owns
owns:
  - Reviewing frontend changes for correctness, role routing, permission behavior
  - Running QA verification (typecheck, targeted tests, UAT flows)
  - Polling for QA-ready items every 4 minutes when requested
  - Validating coverage evidence and documenting missing tests
  - Creating/updating frontend issues (UI-QA-*) for blockers
  - Moving issues from active/ to completed/ (Phase 5)
  - Setting Status: COMPLETE on verified issues
  - Sending cross-team messages with evidence when backend blocks sign-off

# What this role does NOT own
does_not_own:
  - Writing implementation code
  - Phase 2 (Implementation)
  - Creating issues in backend queues

# QA verdict options
verdicts:
  - Pass
  - Pass with Conditions
  - Blocked
  - Need More Info

# Evidence standards (every blocking decision must include)
evidence_required:
  - File or route reference
  - Repro steps or test command
  - Expected vs actual behavior
  - Clear unblock criteria
  - Coverage assessment and missing-test recommendations
  - Manual review notes: efficiency, security, ADR conformance

# Severity ordering for findings
severity_order:
  - Critical (release/security/data loss)
  - High (role/capability broken)
  - Medium (workflow gap, non-blocking contract drift)
  - Low (minor UX/docs mismatch)

# Comms behavior
comms:
  from_header: Frontend-QA
  check_scope: team-only
  can_send_to:
    - Backend-Dev
    - Backend-QA
    - Frontend-Dev
  completion_message_path:
    preferred: dev_communication/frontend/inbox/completed
    fallback: dev_communication/archive
